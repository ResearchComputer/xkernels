default = "beverin"

[profiles.beverin]
host = "beverin"                 # ssh alias from ~/.ssh/config
remote_dir = "/capstor/scratch/cscs/xyao/xkernels"  # scratch working copy
# ssh_control_persist = "30m"
# ssh_control_dir = "~/.ssh/controlmasters"

# bristen: CSCS Cray Shasta, NVIDIA A100-80GB (sm_80) compute nodes. /capstor is
# shared with beverin, so the same remote tree serves both clusters. Select with
#   rcc --profile bristen push   /   rcc --profile bristen run -- ...
[profiles.bristen]
host = "bristen"
remote_dir = "/capstor/scratch/cscs/xyao/xkernels"

# ds5: ETH DGX Spark, aarch64 Grace+Blackwell (GB10, sm_120), CUDA 13.0 toolkit.
# A native-CUDA (CUTE DSL) test bed. No SLURM — use `rcc --profile ds5 run/bg`.
[profiles.ds5]
host = "ds5"
remote_dir = "/local/home/xiayao/xkernels"

[profiles.ds5.env]
TRITON_CACHE_DIR = "/local/home/xiayao/xkernels/.cache/triton"

[profiles.ds5.docker]
image = "nvcr.io/nvidia/pytorch:26.01-py3"
workdir = "/workspace"
gpus = "all"
shm_size = "16g"
network = "host"
# ds5's Docker daemon exposes /dev/nvidia* with --gpus, but CUDA init on GB10
# currently succeeds only with privileged containers.
args = ["--privileged", "--ipc=host", "--ulimit", "memlock=-1", "--ulimit", "stack=67108864"]

[[profiles.ds5.docker.mounts]]
source = "{remote_dir}"
target = "/workspace"
mode = "rw"

[profiles.ds5.docker.env]
PYTHONPATH = "/workspace/src"
TRITON_CACHE_DIR = "/workspace/.cache/triton"
XDG_CACHE_HOME = "/workspace/.cache"

# sgs-gpu07: ETH Systems group node, 4x NVIDIA H100 NVL (sm_90), CUDA 13.0,
# Python 3.12 venv (torch 2.5.1+cu124, triton 3.1.0). No SLURM; venv at .venv/.
# Run via `rcc --profile sgs-gpu07 run -- .venv/bin/python ...`.
[profiles.sgs-gpu07]
host = "sgs-gpu07"
remote_dir = "/home/xiayao/xkernels"
